services:
  db:
    image: postgres:16-alpine
    container_name: starapi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: starblog
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - starapi-network

  starapi:
    image: starapi
    container_name: starapi
    restart: unless-stopped
    build:
      context: .
      dockerfile: StarApi/Dockerfile
    ports:
      - "127.0.0.1:5002:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=starblog;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}
      - ApiKey=${API_KEY:-your-api-key-here-change-in-production}
      - Admin__Username=${ADMIN__USERNAME:-admin}
      - Admin__Password=${ADMIN__PASSWORD:-changeme}
      - Jwt__Issuer=${JWT__ISSUER:-StarApi}
      - Jwt__Audience=${JWT__AUDIENCE:-StarApiAudience}
      - Jwt__Key=${JWT__KEY}
      - Jwt__ExpireMinutes=${JWT__EXPIREMINUTES:-1200}
      - AWS__AccessKey=${AWS__AccessKey}
      - AWS__SecretKey=${AWS__SecretKey}
      - AWS__ServiceURL=${AWS__ServiceURL:-https://sgp1.digitaloceanspaces.com}
      - AWS__BucketName=${AWS__BucketName:-cute33}
      - AWS__CdnBaseUrl=${AWS__CdnBaseUrl:-}
      - AWS__UseHttp=${AWS__UseHttp:-false}
    networks:
      - starapi-network

volumes:
  postgres_data:

networks:
  starapi-network:
    driver: bridge

